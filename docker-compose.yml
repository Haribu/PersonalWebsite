services:
  website:
    build: 
      context: .
      target: dev
    ports:
      - "8080:8080"
    # To enable live reloading of content when drafting posts, we mount the local blog content directory
    volumes:
      - ./website:/app/website
      - ./execution:/app/execution
    # The default command rebuilds the site and starts the server
    command: >
      sh -c "python execution/build_site.py && python execution/verify_build.py && python -m http.server 8080 -d website/public"
