<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }} | {% endif %}Harry McLaren</title>
    
    <!-- Security Best Practices -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <meta name="description" content="Harry McLaren - Head of Cybersecurity Engineering, Writer, and Community Leader.">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ base_url }}/assets/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="site-title">Harry McLaren</a>
            <nav>
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/about.html">About & Experience</a>
                <a href="{{ base_url }}/blog.html">Blog</a>
                <a href="{{ base_url }}/contact.html">Contact</a>
            </nav>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; 2024 Harry McLaren. Built with security in mind.</p>
        </footer>
    </div>
</body>
</html>
