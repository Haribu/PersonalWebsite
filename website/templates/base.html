<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }} | {% endif %}Harry McLaren</title>
    
    <!-- Security Best Practices -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; frame-src 'self' https://docs.google.com;">
    <meta name="description" content="Harry McLaren - Head of Cybersecurity Engineering, Writer, and Community Leader.">
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&family=Fira+Code&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ base_url }}/assets/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="{{ base_url }}/" class="site-title">Harry McLaren</a>
            <nav class="main-nav">
                <a href="{{ base_url }}/">Home</a>
                <a href="{{ base_url }}/advisory.html">Advisory</a>
                <a href="{{ base_url }}/career.html">Career</a>
                <a href="{{ base_url }}/blog.html">Blog</a>
                <a href="{{ base_url }}/contact.html">Contact</a>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Dark/Light Mode">
                    <svg id="moon-icon" class="theme-icon-hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="sun-icon" class="theme-icon-visible" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </nav>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>&copy; <span id="copyright-year">2024</span> Harry McLaren. Built with security in mind.<br/>
            <span class="ai-transparency-footer">Engineered by a human. Coded and maintained with AI.</span></p>
        </footer>
    </div>
    <script src="{{ base_url }}/assets/theme.js"></script>
</body>
</html>
