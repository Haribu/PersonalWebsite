{% extends "base.html" %}

{% block content %}
<article>
    <h1>{{ title }}</h1>
    {% if date %}
    <time class="post-meta" datetime="{{ date }}">{{ date }}</time>
    {% endif %}
    
    <div class="post-content">
        {{ content | safe }}
    </div>
    
    <div style="margin-top: 4rem;">
        <a href="/blog.html">&larr; Back to all posts</a>
    </div>
</article>
{% endblock %}
