{% extends "base.html" %}

{% block content %}
<section>
    <h1>Contact Me</h1>
    <p style="margin-bottom: 2rem;">I'm always open to discussing cybersecurity, speaking engagements, or community events. The best way to reach me directly is via LinkedIn or through this secure form.</p>

    <div style="margin-bottom: 3rem;">
        <a href="https://www.linkedin.com/in/harrymclaren/" target="_blank" rel="noopener noreferrer" class="btn">Connect on LinkedIn</a>
    </div>

    <div class="card">
        <h2 style="margin-top: 0; margin-bottom: 1.5rem;">Secure Message Form</h2>
        <!-- Using Formspree as a secure, static-site friendly endpoint placeholder -->
        <!-- Action URL should be replaced by Harry's actual Formspree/Netlify form endpoint -->
        <form action="https://formspree.io/f/placeholder" method="POST">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required aria-required="true" placeholder="Jane Doe">
            </div>
            
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required aria-required="true" placeholder="jane@example.com">
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required aria-required="true" placeholder="How can I help you?"></textarea>
            </div>
            
            <button type="submit" class="btn">Send Secure Message</button>
        </form>
    </div>
</section>
{% endblock %}
