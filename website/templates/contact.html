{% extends "base.html" %}

{% block content %}
<section>
    <h1>Get in Touch</h1>
    <p class="contact-desc">Whether you'd like to discuss a community speaking engagement, connect regarding technical research, or say hello, you can use the secure form below or connect with me via LinkedIn.</p>

    <div class="contact-btn-wrapper">
        <a href="https://www.linkedin.com/in/harrymclaren/" target="_blank" rel="noopener noreferrer" class="btn">Connect on LinkedIn</a>
    </div>

    <div class="contact-form-wrapper">
        <!-- Embedded Google Form -->

            src="https://docs.google.com/forms/d/e/1FAIpQLSfMWFOH8dPLDubylzpgxNo3wa4N1u40e6tGL8LqW-HfSojuoQ/viewform?embedded=true"

            frameborder="0"
            marginheight="0"

    </div>
</section>
{% endblock %}
