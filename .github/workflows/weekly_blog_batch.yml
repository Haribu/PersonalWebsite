name: Weekly Blog Reminder

on:
  schedule:
    # Sunday 17:00 UTC = 18:00 BST (summer) / 18:00 GMT (winter, 1hr later locally)
    - cron: '0 17 * * 0'
  workflow_dispatch:

# Only one run at a time
concurrency:
  group: blog-reminder
  cancel-in-progress: true

jobs:
  notify-queue-ready:
    runs-on: ubuntu-latest
    permissions:
      issues: write     # Open the reminder issue
      contents: read    # Checkout repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests --quiet

      - name: Check queue and create reminder issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - << 'EOF'
          import json
          import os
          import subprocess
          import sys

          import requests

          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          # Fetch all open blog-queue issues
          r = requests.get(
              "https://api.github.com/repos/Haribu/PersonalWebsite/issues",
              params={"labels": "blog-queue", "state": "open", "per_page": 50},
              headers=headers,
              timeout=15,
          )
          r.raise_for_status()
          issues = r.json()
          count = len(issues)

          if count == 0:
              print("No articles in the queue this week. No reminder needed.")
              sys.exit(0)

          # Build a readable list of queued articles
          article_lines = "\n".join(
              f"- [#{i['number']}]({i['html_url']}): {i['title'].removeprefix('[Queue] ')}"
              for i in issues
          )

          body = f"""## 📚 {count} Article(s) Ready for Blog Generation

          {article_lines}

          ---
          _Open Antigravity and run `/generate_blog_post` to generate this week's drafts._
          _Drafts will be written to a new branch and a PR will be opened for your review._"""

          # Dedent (strip leading spaces from heredoc)
          body = "\n".join(line.lstrip() for line in body.splitlines())

          result = subprocess.run(
              [
                  "gh", "issue", "create",
                  "--title", f"[Blog Queue] {count} article(s) ready to draft",
                  "--body", body,
                  "--label", "blog-queue",
                  "--assignee", "harrymclaren",
              ],
              capture_output=True,
              text=True,
          )

          if result.returncode != 0:
              print(f"[ERROR] Failed to create issue: {result.stderr}", file=sys.stderr)
              sys.exit(1)

          print(f"✅ Reminder issue created: {result.stdout.strip()}")
          EOF
